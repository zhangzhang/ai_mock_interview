<!--
  Onsite — a voice-driven mock coding-interview room.
  Left: the problem sheet. Right: a Java editor + your interviewer, "Sam".
  Sam (powered by Claude) speaks to you, listens to you reason out loud,
  and sees the code in your editor. Works best in desktop Chrome.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Onsite — mock interview room</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

<style>
  :root{
    --ink:#16181f; --panel:#1b1e27; --panel-2:#20242f; --line:#2b2f3c;
    --text:#e6e7ea; --muted:#8b90a0;
    --paper:#e8e5db; --paper-ink:#23252d; --paper-soft:#63656f; --paper-line:#d3cfc2;
    --amber:#f2a63b; --amber-2:#ffbe5c; --amber-soft:rgba(242,166,59,.14);
    --indigo:#7c83ff; --indigo-soft:rgba(124,131,255,.14);
    --green:#4ec89a; --red:#e5735e;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --ui:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--ink);color:var(--text);font-family:var(--ui);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:var(--ui);cursor:pointer;border:none;background:none;color:inherit}
  button:disabled{opacity:.4;cursor:not-allowed}

  .app{height:100vh;display:flex;flex-direction:column}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:18px;padding:10px 18px;
    background:linear-gradient(180deg,#1a1d26,#161820);border-bottom:1px solid var(--line);
    flex:0 0 auto}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mini{width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--amber-2),var(--amber) 55%,#b9772a);
    box-shadow:0 0 12px var(--amber-soft)}
  .brand h1{font-size:16px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin:0}
  .brand span{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-left:2px}
  .spacer{flex:1}
  .topbar select{background:var(--panel-2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--ui);max-width:230px}
  .icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);display:grid;place-items:center;font-size:15px;color:var(--muted)}
  .icon-btn.on{color:var(--amber);border-color:var(--amber)}
  .start-btn{padding:9px 18px;border-radius:9px;font-weight:650;font-size:13.5px;letter-spacing:.02em;
    background:var(--amber);color:#231703;transition:transform .08s ease, filter .15s}
  .start-btn:hover{filter:brightness(1.06)} .start-btn:active{transform:translateY(1px)}
  .start-btn.live{background:transparent;color:var(--red);border:1px solid var(--red)}

  /* ---------- stage ---------- */
  .stage{flex:1;display:flex;min-height:0}

  /* problem sheet */
  .problem{flex:0 0 40%;max-width:560px;background:var(--paper);color:var(--paper-ink);
    overflow:auto;padding:26px 30px 40px}
  .problem .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper-soft);
    font-weight:700;margin-bottom:10px}
  .problem h2{font-size:24px;margin:0 0 12px;line-height:1.15;font-weight:750;letter-spacing:-.01em}
  .chip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;margin-right:8px}
  .chip.easy{background:#cfe9d8;color:#1d6b45} .chip.medium{background:#f2e2c2;color:#8a5a12}
  .chip.hard{background:#f0cfc8;color:#8f3020}
  .chip.pattern{background:#dcdacb;color:#4d4c40}
  .problem .body{margin-top:20px;font-size:14.5px;line-height:1.62;color:#33353d}
  .problem .body p{margin:0 0 14px}
  .problem .body strong{color:var(--paper-ink)}
  .problem .body pre{background:#dedbcf;border:1px solid var(--paper-line);border-radius:8px;
    padding:12px 14px;font-family:var(--mono);font-size:13px;line-height:1.5;overflow:auto;color:#2c2e35;margin:0 0 14px}
  .problem .body ul{margin:0 0 14px;padding-left:20px} .problem .body li{margin:5px 0}
  .problem .body h4{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--paper-soft);
    margin:22px 0 9px}

  .grip{flex:0 0 1px;background:var(--line)}

  /* work pane */
  .work{flex:1;display:flex;flex-direction:column;min-width:0}
  .editor-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:9px 16px;
    background:var(--panel);border-bottom:1px solid var(--line)}
  .file{font-family:var(--mono);font-size:13px;color:var(--text)}
  .lang{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--amber);
    border:1px solid var(--amber);border-radius:5px;padding:2px 7px}
  .you-dot{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .you-dot i{width:8px;height:8px;border-radius:50%;background:var(--indigo);box-shadow:0 0 8px var(--indigo-soft)}

  .editor-wrap{flex:1;min-height:0;position:relative;background:var(--ink)}
  .CodeMirror{height:100%!important;background:var(--ink)!important;font-family:var(--mono)!important;
    font-size:14px;line-height:1.55}
  .CodeMirror-gutters{background:#14161d!important;border-right:1px solid var(--line)!important}
  #fallback{width:100%;height:100%;resize:none;border:none;outline:none;background:var(--ink);
    color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.55;padding:12px 14px}

  /* interviewer dock */
  .dock{flex:0 0 42%;min-height:220px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#191c24,#171921);border-top:1px solid var(--line)}
  .dock-head{display:flex;align-items:center;gap:14px;padding:12px 18px 10px}
  .orb-wrap{position:relative;width:44px;height:44px;flex:0 0 44px}
  .orb{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--amber-2),var(--amber) 52%,#a9691f 100%);
    box-shadow:0 0 18px var(--amber-soft);transition:transform .3s ease}
  .orb-wrap.speaking .orb{animation:breathe 1.1s ease-in-out infinite}
  .orb-wrap .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--amber);opacity:0}
  .orb-wrap.speaking .ring{animation:ripple 1.5s ease-out infinite}
  .orb-wrap.listening .orb{background:radial-gradient(circle at 35% 30%,#a8adff,var(--indigo) 55%,#4750c9)}
  .orb-wrap.listening .ring{border-color:var(--indigo);animation:ripple 1.15s ease-out infinite}
  .orb-wrap.thinking .orb{animation:breathe 2.4s ease-in-out infinite;filter:saturate(.6)}
  @keyframes ripple{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.85);opacity:0}}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  .who{display:flex;flex-direction:column;gap:1px}
  .who b{font-size:14px;letter-spacing:.01em}
  .who small{font-size:12px;color:var(--muted)}
  .status{margin-left:auto;font-size:12px;color:var(--amber);letter-spacing:.03em;min-height:16px}

  .transcript{flex:1;overflow:auto;padding:4px 18px 12px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5}
  .msg.sam{align-self:flex-start;background:var(--amber-soft);border:1px solid rgba(242,166,59,.28);
    border-top-left-radius:4px}
  .msg.you{align-self:flex-end;background:var(--indigo-soft);border:1px solid rgba(124,131,255,.3);
    border-top-right-radius:4px}
  .msg.system{align-self:center;background:transparent;color:var(--muted);font-size:12px;
    text-align:center;max-width:90%;padding:4px}
  .msg .tag{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-bottom:3px}

  .talkbar{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:11px 16px;
    border-top:1px solid var(--line);background:#15171e}
  .mic{width:46px;height:46px;flex:0 0 46px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel-2);display:grid;place-items:center;font-size:19px;transition:.15s}
  .mic.rec{background:var(--indigo);border-color:var(--indigo);color:#fff;
    box-shadow:0 0 0 4px var(--indigo-soft);animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--indigo-soft)}50%{box-shadow:0 0 0 9px transparent}}
  .talkbar input{flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;color:var(--text);font-size:13.5px;font-family:var(--ui)}
  .talkbar input:focus{outline:none;border-color:var(--amber)}
  .pill{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);
    font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap}
  .pill:hover:not(:disabled){color:var(--text);border-color:#3a3f4d}
  .pill.send{background:var(--amber);color:#231703;border-color:var(--amber)}
  .pill.hint{color:var(--amber-2)}

  .note{font-size:11.5px;color:var(--muted);padding:0 18px 10px;margin-top:-4px}
  .note.warn{color:var(--red)}
  .banner{margin:6px 18px 8px;padding:10px 13px;border-radius:9px;font-size:12.5px;line-height:1.48;
    background:var(--amber-soft);border:1px solid rgba(242,166,59,.35);color:var(--amber-2)}
  .banner.err{background:rgba(229,115,94,.12);border-color:rgba(229,115,94,.42);color:#f0a091}
  .chip-row{margin:6px 18px 8px;display:flex;align-items:center;gap:10px;padding:9px 12px;
    border:1px solid var(--line);border-radius:9px;background:var(--panel-2);font-size:12.5px}
  .chip-row #chipText{flex:1;color:var(--text)}
  .drawer{margin:2px 18px 8px;padding:13px 14px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel-2);display:flex;flex-direction:column;gap:14px}
  .drawer-section{display:flex;flex-direction:column;gap:9px}
  .drawer-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .keyrow{display:flex;gap:8px}
  .keyrow input{background:#14161d;border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;color:var(--text);font-size:12.5px;font-family:var(--mono)}
  .keyrow input#apiKey{flex:1;min-width:0}
  .keyrow input#apiModel{width:172px;flex:0 0 172px}
  .keyrow input:focus{outline:none;border-color:var(--amber)}
  .vpanel{display:flex;flex-direction:column;gap:9px}
  .seg{display:inline-flex;background:#14161d;border:1px solid var(--line);border-radius:8px;
    overflow:hidden;width:fit-content}
  .seg button{padding:6px 13px;font-size:12px;color:var(--muted)}
  .seg button.on{background:var(--amber);color:#231703;font-weight:650}
  .vrow{display:flex;gap:8px;align-items:center}
  .vpanel select,.vpanel input{background:#14161d;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;color:var(--text);font-size:12.5px;font-family:var(--ui)}
  .vpanel select{flex:1;min-width:0}
  .vpanel input#openaiKey{flex:1;min-width:0;font-family:var(--mono)}
  .vpanel select#openaiVoice,.vpanel select#openaiModel{flex:0 0 130px;width:130px}
  #testVoice{width:fit-content}
  .speed-row input[type=range]{flex:1;accent-color:var(--amber)}
  #speedLabel{font-size:12px;color:var(--text);width:38px;text-align:right;font-variant-numeric:tabular-nums}

  @media(max-width:860px){
    .stage{flex-direction:column}
    .problem{flex:0 0 auto;max-width:none;max-height:38vh}
    .grip{display:none}
    .dock{flex:0 0 auto;min-height:44vh}
  }
</style>

/* ============================ interviewer brain ============================ */
const SYSTEM_BASE =
`You are Sam, a senior staff engineer running a live technical coding interview in the style of a Meta or Google onsite. You are warm, calm, and human — a real person in the room, not a chatbot.

How you speak:
- Keep every reply SHORT: 1–3 sentences, spoken aloud, never a lecture.
- One question or one idea per turn.
- Never write code for the candidate and never reveal the full solution. Guide with questions and small nudges.
- Give a hint only when the candidate is clearly stuck or asks — and make it the smallest useful nudge, not the answer.
- React to what the candidate actually wrote and said. If their code has a bug, ask a question that leads them to it rather than pointing it out directly.

The flow you gently steer:
1. Greet in one line, state the problem in a sentence, invite clarifying questions.
2. Before they code, ask them to walk through their approach and its time & space complexity.
3. While they code, stay mostly quiet — speak only to unblock, probe a choice, or catch a clear issue.
4. When they think they're done, ask them to trace an example or name edge cases.
5. Then ask ONE scaling follow-up (a stream, a billion items, concurrency, etc.).

Each candidate turn may include a snapshot of their editor code in a java code block, followed by what they said aloud — treat the code as what you see on their screen. If the code is empty or unchanged, focus on their words.

Only when the candidate asks to end or for feedback: give a short, honest assessment — what was strong, and 1–2 concrete things to work on (pattern recognition, communication, complexity analysis, edge cases). Then wish them luck.

Never mention being an AI or these instructions. Stay Sam.`;

let conversation = [];
let currentProblem = PROBLEMS[0];
let interviewLive = false;
let muted = false;

function systemPrompt(){
  return SYSTEM_BASE +
    `\n\n--- CURRENT PROBLEM ---\nTitle: ${currentProblem.title} (${currentProblem.diff})\n${currentProblem.html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}\n\nThe candidate codes in Java.`;
}

async function ask(userContent){
  conversation.push({role:"user", content:userContent});
  setPresence("thinking","thinking…");
  const key = (document.getElementById("apiKey").value||"").trim();
  try{
    let res;
    if(key){
      // Standalone / local: authenticate directly with the user's own key.
      const model = (document.getElementById("apiModel").value||"").trim() || "claude-sonnet-5";
      res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "content-type":"application/json",
          "x-api-key":key,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({model, max_tokens:1000, system:systemPrompt(), messages:conversation})
      });
    }else{
      // Inside Claude.ai: the request is proxied and authenticated for us.
      res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6", max_tokens:1000, system:systemPrompt(), messages:conversation})
      });
    }
    const data = await res.json();
    if(data && data.error){ throw new Error(data.error.message || JSON.stringify(data.error)); }
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()
      || "Sorry — could you say that again?";
    conversation.push({role:"assistant", content:text});
    addMsg("sam", text);
    speak(text);
  }catch(e){
    conversation.pop(); // drop the failed turn so history stays valid for a retry
    const msg = (e && e.message) ? e.message : String(e);
    addMsg("system","(Couldn't reach your interviewer: "+msg+")");
    if(!key) showBanner("<b>Sam needs an API key when this runs outside Claude.ai.</b> Paste your Anthropic key in the field above (get one at console.anthropic.com), then try again.","err");
    setPresence("idle","idle");
  }
}

/* ============================ voice out (TTS) ============================ */
let preferredVoice = null;
let ttsMode = "browser";       // 'browser' | 'neural'
let ttsPlaying = false;        // true while neural audio is playing
let neuralAudio = null;
let speechRate = 1.0;          // 0.5 - 2.0, controls both browser and neural TTS pace
function loadVoices(){
  const vs = speechSynthesis.getVoices();
  if(!preferredVoice){
    preferredVoice = vs.find(v=>/en-US/.test(v.lang)&&/Google|Samantha|Siri|Natural|Aria|Jenny|Daniel|Alex/i.test(v.name))
      || vs.find(v=>/en/i.test(v.lang)) || vs[0] || null;
  }
  fillVoiceSelect(vs);
}
function fillVoiceSelect(vs){
  const sel = document.getElementById("voiceSel");
  if(!sel || !vs || !vs.length) return;
  sel.innerHTML = vs.map((v,i)=>`<option value="${i}">${v.name} — ${v.lang}${v.default?" (default)":""}</option>`).join("");
  const idx = vs.indexOf(preferredVoice);
  if(idx>=0) sel.value = String(idx);
  sel.onchange = ()=>{ preferredVoice = speechSynthesis.getVoices()[parseInt(sel.value,10)] || preferredVoice; };
}
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

function stripForSpeech(t){
  return t.replace(/```[\s\S]*?```/g," code block ").replace(/[`*_#>]/g,"").trim();
}
function speaking(){ return ("speechSynthesis" in window && speechSynthesis.speaking) || ttsPlaying; }
function stopNeural(){ if(neuralAudio){ try{neuralAudio.pause();}catch(_){}} ttsPlaying=false; }
function stopAllSpeech(){ if("speechSynthesis" in window) speechSynthesis.cancel(); stopNeural(); }
function onSpeechEnd(){
  if(!listening) setPresence("idle", interviewLive?"listening for you":"idle");
  if(interviewLive && handsFree && !listening){
    setTimeout(()=>{ if(interviewLive && handsFree && !listening) startListening(); }, 300);
  }
}

function speak(text){
  if(muted) return;
  const oaKey = (document.getElementById("openaiKey")||{}).value;
  if(ttsMode==="neural" && oaKey && oaKey.trim()){ speakNeural(text); return; }
  speakBrowser(text);
}
function speakBrowser(text){
  if(!("speechSynthesis" in window)) return;
  stopAllSpeech();
  const u = new SpeechSynthesisUtterance(stripForSpeech(text));
  if(preferredVoice) u.voice = preferredVoice;
  u.rate = speechRate; u.pitch = 1.0;
  u.onstart = ()=>setPresence("speaking","speaking…");
  u.onend   = onSpeechEnd;
  speechSynthesis.speak(u);
}
async function speakNeural(text){
  const key = document.getElementById("openaiKey").value.trim();
  const voice = document.getElementById("openaiVoice").value;
  const model = document.getElementById("openaiModel").value;
  stopAllSpeech();
  setPresence("speaking","speaking…");
  try{
    const body = { model, voice, input:stripForSpeech(text), response_format:"mp3" };
    if(model==="tts-1"||model==="tts-1-hd"){
      body.speed = speechRate;
    }
    if(model==="gpt-4o-mini-tts"){
      let pace = "";
      if(speechRate < 0.85) pace = " Speak at a noticeably slower, more deliberate pace.";
      else if(speechRate > 1.15) pace = " Speak at a noticeably brisker pace.";
      body.instructions = "You are a calm, warm, professional technical interviewer. Speak naturally, at a measured, unhurried pace."+pace;
    }
    const res = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{ "Authorization":"Bearer "+key, "Content-Type":"application/json" },
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let m = "HTTP "+res.status;
      try{ const j = await res.json(); m = (j.error&&j.error.message)||m; }catch(_){}
      throw new Error(m);
    }
    const url = URL.createObjectURL(new Blob([await res.arrayBuffer()],{type:"audio/mpeg"}));
    neuralAudio = new Audio(url); ttsPlaying = true;
    neuralAudio.onended = ()=>{ ttsPlaying=false; URL.revokeObjectURL(url); onSpeechEnd(); };
    neuralAudio.onerror = ()=>{ ttsPlaying=false; };
    await neuralAudio.play();
  }catch(e){
    ttsPlaying=false;
    setNote("Neural voice failed ("+(e.message||e)+") — falling back to the browser voice. A CORS error usually means: serve the file over http://localhost.", true);
    speakBrowser(text);
  }
}

/* ============================ voice in (STT) ============================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, listening = false, sttOK = !!SR, heard = "";
const PAUSE_MS = 1200;
let handsFree = false, silenceTimer = null;
function clearSilenceTimer(){ if(silenceTimer){ clearTimeout(silenceTimer); silenceTimer=null; } }
if(SR){
  recog = new SR(); recog.lang="en-US"; recog.interimResults=true; recog.continuous=true;
  recog.onresult = e=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i];
      if(r.isFinal) heard += r[0].transcript+" "; else interim += r[0].transcript;
    }
    textInput.value = (heard+interim).trim();
    if(handsFree && listening){
      clearSilenceTimer();
      silenceTimer = setTimeout(()=>{
        if(textInput.value.trim()) sendSpoken();
      }, PAUSE_MS);
    }
  };
  recog.onerror = ev=>{
    if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){
      sttOK=false; micBtn.disabled=true; handsFree=false; clearSilenceTimer(); stopListening();
      showBanner("<b>Mic blocked.</b> This preview frame won't allow the microphone. Download this file and open it in Chrome to talk out loud — for now, type your responses below.", "err");
    }
  };
  recog.onend = ()=>{ if(listening){ try{recog.start();}catch(_){}}};
}
async function startListening(){
  if(!SR){ setNote("Voice input isn't supported in this browser — try Chrome, or type your response.", true); return; }
  if(listening) return;
  // Force the browser's permission prompt so we can tell exactly why the mic fails.
  try{
    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      stream.getTracks().forEach(t=>t.stop()); // permission is all we needed
    }
  }catch(err){
    sttOK=false; micBtn.disabled=true; micBtn.classList.remove("rec");
    showBanner("<b>Mic blocked ("+((err&&err.name)||"denied")+").</b> This preview frame won't allow the microphone. Download this file and open it in Chrome to talk out loud — for now, type your responses below.", "err");
    return;
  }
  stopAllSpeech();
  heard=""; textInput.value=""; clearSilenceTimer();
  try{ recog.start(); }catch(_){}
  listening=true; micBtn.classList.add("rec");
  if(!speaking()) setPresence("listening","listening…");
}
function stopListening(){
  listening=false; micBtn.classList.remove("rec"); clearSilenceTimer();
  if(recog){ try{recog.stop();}catch(_){}}
  if(!speaking()) setPresence("idle", interviewLive?"idle":"idle");
}

/* ============================ editor ============================ */
let cm = null;
function initEditor(){
  const wrap = document.getElementById("editorWrap");
  if(window.CodeMirror){
    document.getElementById("fallback").style.display="none";
    cm = CodeMirror(wrap,{
      value: currentProblem.starter, mode:"text/x-java", theme:"material-darker",
      lineNumbers:true, indentUnit:4, tabSize:4, indentWithTabs:false,
      autoCloseBrackets:true, matchBrackets:true, lineWrapping:false
    });
  }else{
    const fb = document.getElementById("fallback");
    fb.value = currentProblem.starter;
  }
}
function getCode(){ return cm ? cm.getValue() : document.getElementById("fallback").value; }
function setCode(v){ if(cm) cm.setValue(v); else document.getElementById("fallback").value=v; }

/* ============================ UI helpers ============================ */
const orbWrap=document.getElementById("orbWrap"), statusEl=document.getElementById("status"),
      transcript=document.getElementById("transcript"), noteEl=document.getElementById("note"),
      textInput=document.getElementById("textInput"), micBtn=document.getElementById("micBtn"),
      sendBtn=document.getElementById("sendBtn"), shareBtn=document.getElementById("shareBtn"),
      hintBtn=document.getElementById("hintBtn"), feedbackBtn=document.getElementById("feedbackBtn"),
      startBtn=document.getElementById("startBtn"), muteBtn=document.getElementById("muteBtn"),
      voiceBtn=document.getElementById("voiceBtn"),
      problemSelect=document.getElementById("problemSelect"), problemPane=document.getElementById("problemPane");

function setPresence(state, label){
  orbWrap.className = "orb-wrap "+(state||"");
  if(label!=null) statusEl.textContent = label;
}
function setNote(t, warn){ noteEl.textContent=t||""; noteEl.className = "note"+(warn?" warn":""); }
function showBanner(html, kind){
  const b=document.getElementById("banner");
  b.style.display="block"; b.className="banner"+(kind==="err"?" err":""); b.innerHTML=html;
}
function addMsg(who, text){
  const d=document.createElement("div"); d.className="msg "+who;
  if(who!=="system"){
    const tag=document.createElement("span"); tag.className="tag";
    tag.textContent = who==="sam"?"Sam":"You"; d.appendChild(tag);
  }
  d.appendChild(document.createTextNode(text));
  transcript.appendChild(d); transcript.scrollTop=transcript.scrollHeight;
}
function renderProblem(){
  const p=currentProblem;
  problemPane.innerHTML =
    `<div class="eyebrow">Problem</div>
     <h2>${p.title}</h2>
     <div><span class="chip ${p.diff}">${p.diff}</span><span class="chip pattern">${p.pattern}</span></div>
     <div class="body">${p.html}</div>`;
}
function renderSelect(){
  problemSelect.innerHTML = PROBLEMS.map(p=>`<option value="${p.id}">${p.title} · ${p.diff}</option>`).join("");
}

/* ============================ turns ============================ */
function buildTurn(spoken, meta){
  const code = getCode().trim();
  let out = "```java\n"+(code||"(editor is empty)")+"\n```\n\n";
  if(meta) out += meta;
  else out += "(Candidate said aloud): "+(spoken||"(nothing)");
  return out;
}
function sendSpoken(){
  const spoken = textInput.value.trim();
  if(!spoken){ return; }
  if(listening) stopListening();
  addMsg("you", spoken);
  textInput.value=""; heard="";
  ask(buildTurn(spoken));
}

/* ============================ wiring ============================ */
function startInterview(){
  interviewLive = true; conversation = [];
  transcript.innerHTML="";
  setCode(currentProblem.starter);
  [textInput,sendBtn,shareBtn,hintBtn,feedbackBtn].forEach(el=>el.disabled=false);
  micBtn.disabled = !sttOK;
  textInput.placeholder = sttOK ? "Talk out loud (push the mic) — or type here" : "Type your response here";
  startBtn.textContent="End session"; startBtn.classList.add("live");
  problemSelect.disabled = true;
  setNote(sttOK ? "Push the mic and think out loud, just like the real thing. Sam can see your code."
                : "Mic not available here — type your reasoning. Sam still speaks and sees your code.", !sttOK);
  addMsg("system","Interview started — "+currentProblem.title);
  ask("Let's begin the interview. Please greet me and present the problem.");
}
function endInterview(){
  interviewLive=false; handsFree=false; stopListening();
  stopAllSpeech();
  [textInput,sendBtn,shareBtn,hintBtn,feedbackBtn,micBtn].forEach(el=>el.disabled=true);
  startBtn.textContent="Start interview"; startBtn.classList.remove("live");
  problemSelect.disabled=false; setPresence("idle","idle");
}

startBtn.onclick = ()=> interviewLive ? endInterview() : startInterview();
muteBtn.onclick = ()=>{
  muted=!muted; muteBtn.classList.toggle("on",!muted);
  muteBtn.textContent = muted?"🔇":"🔊";
  if(muted) stopAllSpeech();
};
micBtn.onclick = ()=>{
  if(listening){
    handsFree = false;
    stopListening(); sendSpoken();
  }else{
    handsFree = true;
    startListening();
  }
};

let drawerAutoFoldArmed = true;
function updateChip(){
  const parts=[];
  const key=(document.getElementById("apiKey").value||"").trim();
  if(key) parts.push("✓ Claude connected");
  parts.push(ttsMode==="neural"?"Neural voice":"Browser voice");
  parts.push(speechRate.toFixed(1)+"x");
  document.getElementById("chipText").textContent = parts.join(" · ");
}
function openDrawer(){
  document.getElementById("settingsDrawer").style.display="flex";
  document.getElementById("chipRow").style.display="none";
  voiceBtn.classList.add("on");
}
function closeDrawerToChip(){
  updateChip();
  document.getElementById("settingsDrawer").style.display="none";
  document.getElementById("chipRow").style.display="flex";
  voiceBtn.classList.remove("on");
}
function foldOnce(){
  if(!drawerAutoFoldArmed) return;
  drawerAutoFoldArmed = false;
  closeDrawerToChip();
}
function armVoiceAutoFold(){
  document.getElementById("ttsSeg").addEventListener("click", foldOnce);
  document.getElementById("speedRange").addEventListener("input", foldOnce);
  document.getElementById("voiceSel").addEventListener("change", foldOnce);
  document.getElementById("openaiVoice").addEventListener("change", foldOnce);
  document.getElementById("openaiModel").addEventListener("change", foldOnce);
  document.getElementById("testVoice").addEventListener("click", foldOnce);
}
voiceBtn.onclick = ()=>{
  const open = document.getElementById("settingsDrawer").style.display==="none";
  if(open) openDrawer(); else closeDrawerToChip();
};
document.getElementById("editSettings").onclick = openDrawer;
document.getElementById("apiKey").addEventListener("input", ()=>{
  if((document.getElementById("apiKey").value||"").trim()) foldOnce();
});
document.getElementById("ttsSeg").addEventListener("click", e=>{
  const b=e.target.closest("button[data-mode]"); if(!b) return;
  ttsMode=b.dataset.mode;
  [...document.querySelectorAll("#ttsSeg button")].forEach(x=>x.classList.toggle("on", x===b));
  document.getElementById("browserRow").style.display = ttsMode==="browser"?"flex":"none";
  document.getElementById("neuralRow").style.display  = ttsMode==="neural" ?"flex":"none";
});
document.getElementById("speedRange").addEventListener("input", e=>{
  speechRate = parseFloat(e.target.value);
  document.getElementById("speedLabel").textContent = speechRate.toFixed(1)+"x";
});
document.getElementById("testVoice").onclick = ()=>{
  const prev=muted; muted=false;
  speak("Hi, I'm Sam. Walk me through your thinking on this one — I'm listening.");
  muted=prev;
};
sendBtn.onclick = sendSpoken;
textInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); sendSpoken(); }});
shareBtn.onclick = ()=>{ addMsg("you","(shared current code)"); ask(buildTurn("", "(Candidate wants you to look at their current code and react.)")); };
hintBtn.onclick = ()=>{ addMsg("you","(asked for a hint)"); ask(buildTurn("", "(Candidate is stuck and asks for the smallest possible hint — do not give the full solution.)")); };
feedbackBtn.onclick = ()=>{ addMsg("you","(asked to wrap up)"); ask(buildTurn("", "(Candidate wants to end now and asks for honest feedback on their performance.)")); };

problemSelect.onchange = ()=>{
  currentProblem = PROBLEMS.find(p=>p.id===problemSelect.value)||PROBLEMS[0];
  renderProblem(); if(!interviewLive) setCode(currentProblem.starter);
};

/* ============================ boot ============================ */
window.addEventListener("load", ()=>{
  renderSelect(); renderProblem(); initEditor();
  if("speechSynthesis" in window) loadVoices();
  document.getElementById("settingsDrawer").style.display="flex"; voiceBtn.classList.add("on");
  addMsg("system","Choose a problem, then press Start interview. Sam will greet you — talk it through out loud, like a real onsite.");
  const embedded = (window.self !== window.top);
  if(embedded){
    document.getElementById("connectionSection").style.display="none";
    armVoiceAutoFold();
    if(SR) showBanner("<b>You're viewing this inside a preview frame, which blocks the microphone.</b> To talk out loud, download this file (the ⤓ icon) and open it in Chrome. You can type here for now — Sam still speaks and sees your code.");
  }else{
    showBanner("<b>Running locally — paste your Anthropic API key above to wake Sam.</b> Get one at console.anthropic.com. It stays in this browser tab and is sent only to Anthropic; a full mock costs a few cents. The mic works here too — push it and allow access.");
  }
  if(!("speechSynthesis" in window)) setNote("Your browser can't do voice output — Sam will still type. Chrome works best.", true);
  else if(!sttOK) setNote("Voice input isn't supported here — you can type responses. Sam speaks aloud. (Chrome works best.)", true);
});
</script>

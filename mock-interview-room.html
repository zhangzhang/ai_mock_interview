<!--
  Onsite — a voice-driven mock coding-interview room.
  Left: the problem sheet. Right: a Java editor + your interviewer, "Sam".
  Sam (powered by OpenAI) speaks to you, listens to you reason out loud,
  and sees the code in your editor. Works best served over http://localhost.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Onsite — mock interview room</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

<style>
  :root{
    --ink:#16181f; --panel:#1b1e27; --panel-2:#20242f; --line:#2b2f3c;
    --text:#e6e7ea; --muted:#8b90a0;
    --amber:#f2a63b; --amber-2:#ffbe5c; --amber-soft:rgba(242,166,59,.14);
    --indigo:#7c83ff; --indigo-soft:rgba(124,131,255,.14);
    --green:#4ec89a; --red:#e5735e;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --ui:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--ink);color:var(--text);font-family:var(--ui);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:var(--ui);cursor:pointer;border:none;background:none;color:inherit}
  button:disabled{opacity:.4;cursor:not-allowed}

  .app{height:100vh;display:flex;flex-direction:column}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:18px;padding:10px 18px;
    background:linear-gradient(180deg,#1a1d26,#161820);border-bottom:1px solid var(--line);
    flex:0 0 auto}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mini{width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--amber-2),var(--amber) 55%,#b9772a);
    box-shadow:0 0 12px var(--amber-soft)}
  .brand h1{font-size:16px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin:0}
  .brand span{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-left:2px}
  .spacer{flex:1}
  .topbar select{background:var(--panel-2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--ui);max-width:230px}
  .icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);display:grid;place-items:center;font-size:15px;color:var(--muted)}
  .icon-btn.on{color:var(--amber);border-color:var(--amber)}
  #voiceBtn{font-size:19px}
  .start-btn{padding:9px 18px;border-radius:9px;font-weight:650;font-size:13.5px;letter-spacing:.02em;
    background:var(--amber);color:#231703;transition:transform .08s ease, filter .15s}
  .start-btn:hover{filter:brightness(1.06)} .start-btn:active{transform:translateY(1px)}
  .start-btn.live{background:transparent;color:var(--red);border:1px solid var(--red)}

  /* ---------- stage ---------- */
  .stage{flex:1;display:flex;min-height:0}

  /* problem sheet */
  .problem{flex:0 0 var(--problem-w,40%);background:var(--panel);color:var(--text);
    overflow:auto;padding:26px 30px 40px}
  .problem .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin-bottom:10px}
  .problem h2{font-size:24px;margin:0 0 12px;line-height:1.15;font-weight:750;letter-spacing:-.01em}
  .chip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;margin-right:8px}
  .chip.easy{background:rgba(78,200,154,.16);color:var(--green)}
  .chip.medium{background:var(--amber-soft);color:var(--amber-2)}
  .chip.hard{background:rgba(229,115,94,.16);color:var(--red)}
  .chip.pattern{background:var(--panel-2);color:var(--muted)}
  .problem .body{margin-top:20px;font-size:14.5px;line-height:1.62;color:var(--text)}
  .problem .body p{margin:0 0 14px}
  .problem .body strong{color:var(--text)}
  .problem .body pre{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;font-family:var(--mono);font-size:13px;line-height:1.5;overflow:auto;color:var(--text);margin:0 0 14px}
  .problem .body ul{margin:0 0 14px;padding-left:20px} .problem .body li{margin:5px 0}
  .problem .body a.lc-link{color:var(--amber-2);text-decoration:none;font-weight:600;
    border-bottom:1px solid rgba(242,166,59,.4)}
  .problem .body a.lc-link:hover{border-bottom-color:var(--amber-2)}
  .problem .body h4{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
    margin:22px 0 9px}

  .grip{flex:0 0 6px;background:var(--line);cursor:col-resize;transition:background .15s;
    position:relative;z-index:2}
  .grip:hover{background:#3a3f4d}
  .grip.dragging{background:var(--amber)}

  /* work pane */
  .work{flex:1;display:flex;flex-direction:column;min-width:0}
  .editor-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:9px 16px;
    background:var(--panel);border-bottom:1px solid var(--line)}
  .file{font-family:var(--mono);font-size:13px;color:var(--text)}
  .lang{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--amber);
    border:1px solid var(--amber);border-radius:5px;padding:2px 7px}
  .you-dot{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .you-dot i{width:8px;height:8px;border-radius:50%;background:var(--indigo);box-shadow:0 0 8px var(--indigo-soft)}

  .editor-wrap{flex:1;min-height:0;position:relative;background:var(--ink)}
  .CodeMirror{height:100%!important;background:var(--ink)!important;font-family:var(--mono)!important;
    font-size:14px;line-height:1.55}
  .CodeMirror-gutters{background:#14161d!important;border-right:1px solid var(--line)!important}
  #fallback{width:100%;height:100%;resize:none;border:none;outline:none;background:var(--ink);
    color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.55;padding:12px 14px}

  /* interviewer dock */
  .dock{flex:0 0 42%;min-height:220px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#191c24,#171921);border-top:1px solid var(--line)}
  .dock-head{display:flex;align-items:center;gap:14px;padding:12px 18px 10px}
  .orb-wrap{position:relative;width:44px;height:44px;flex:0 0 44px}
  .orb{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--amber-2),var(--amber) 52%,#a9691f 100%);
    box-shadow:0 0 18px var(--amber-soft);transition:transform .3s ease}
  .orb-wrap.speaking .orb{animation:breathe 1.1s ease-in-out infinite}
  .orb-wrap .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--amber);opacity:0}
  .orb-wrap.speaking .ring{animation:ripple 1.5s ease-out infinite}
  .orb-wrap.listening .orb{background:radial-gradient(circle at 35% 30%,#a8adff,var(--indigo) 55%,#4750c9)}
  .orb-wrap.listening .ring{border-color:var(--indigo);animation:ripple 1.15s ease-out infinite}
  .orb-wrap.thinking .orb{animation:breathe 2.4s ease-in-out infinite;filter:saturate(.6)}
  @keyframes ripple{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.85);opacity:0}}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  .who{display:flex;flex-direction:column;gap:1px}
  .who b{font-size:14px;letter-spacing:.01em}
  .who small{font-size:12px;color:var(--muted)}
  .status{margin-left:auto;font-size:12px;color:var(--amber);letter-spacing:.03em;min-height:16px}

  .transcript{flex:1;overflow:auto;padding:4px 18px 12px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5}
  .msg.sam{align-self:flex-start;background:var(--amber-soft);border:1px solid rgba(242,166,59,.28);
    border-top-left-radius:4px}
  .msg.you{align-self:flex-end;background:var(--indigo-soft);border:1px solid rgba(124,131,255,.3);
    border-top-right-radius:4px}
  .msg.system{align-self:center;background:transparent;color:var(--muted);font-size:12px;
    text-align:center;max-width:90%;padding:4px}
  .msg .tag{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-bottom:3px}

  .talkbar{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:11px 16px;
    border-top:1px solid var(--line);background:#15171e}
  .mic{width:46px;height:46px;flex:0 0 46px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel-2);display:grid;place-items:center;font-size:19px;transition:.15s}
  .mic.rec{background:var(--indigo);border-color:var(--indigo);color:#fff;
    box-shadow:0 0 0 4px var(--indigo-soft);animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--indigo-soft)}50%{box-shadow:0 0 0 9px transparent}}
  .talkbar input{flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;color:var(--text);font-size:13.5px;font-family:var(--ui)}
  .talkbar input:focus{outline:none;border-color:var(--amber)}
  .pill{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);
    font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap}
  .pill:hover:not(:disabled){color:var(--text);border-color:#3a3f4d}
  .pill.send{background:var(--amber);color:#231703;border-color:var(--amber)}
  .pill.hint{color:var(--amber-2)}

  .note{font-size:11.5px;color:var(--muted);padding:0 18px 10px;margin-top:-4px}
  .note.warn{color:var(--red)}
  .banner{margin:6px 18px 8px;padding:10px 13px;border-radius:9px;font-size:12.5px;line-height:1.48;
    background:var(--amber-soft);border:1px solid rgba(242,166,59,.35);color:var(--amber-2)}
  .banner.err{background:rgba(229,115,94,.12);border-color:rgba(229,115,94,.42);color:#f0a091}
  .settings-modal{width:min(560px,92vw);max-height:88vh;overflow:auto;padding:0;border:none;
    border-radius:14px;background:var(--panel);color:var(--text);
    box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .settings-modal::backdrop{background:rgba(9,10,14,.62);backdrop-filter:blur(2px)}
  .modal-head{display:flex;align-items:center;gap:10px;padding:15px 18px;
    border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
  .modal-head b{font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
  .modal-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--muted);font-size:16px;line-height:1;display:grid;place-items:center}
  .modal-head .x:hover{color:var(--text);border-color:#3a3f4d}
  .modal-body{padding:16px 18px 20px;display:flex;flex-direction:column;gap:0}
  .modal-section{display:flex;flex-direction:column;gap:10px}
  .modal-section:not(:last-child){padding-bottom:15px;margin-bottom:15px;border-bottom:1px solid var(--line)}
  .modal-label{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .modal-label::before{content:"";width:5px;height:5px;border-radius:50%;
    background:var(--amber);box-shadow:0 0 6px var(--amber-soft)}
  .keyrow{display:flex;gap:8px}
  .keyrow input{background:#14161d;border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;color:var(--text);font-size:12.5px;font-family:var(--mono)}
  .keyrow input#apiKey{flex:1;min-width:0}
  .keyrow input:focus{outline:none;border-color:var(--amber)}
  .keyrow select{background:#14161d;border:1px solid var(--line);border-radius:9px;
    padding:9px 10px;color:var(--text);font-size:12.5px;font-family:var(--ui);flex:0 0 128px;width:128px}
  .keyrow select:focus{outline:none;border-color:var(--amber)}
  .key-note{font-size:11px;color:var(--muted);line-height:1.4;margin-top:-2px}
  .vpanel{display:flex;flex-direction:column;gap:9px}
  .seg{display:inline-flex;background:#14161d;border:1px solid var(--line);border-radius:8px;
    overflow:hidden;width:fit-content}
  .seg button{padding:6px 13px;font-size:12px;color:var(--muted)}
  .seg button.on{background:var(--amber);color:#231703;font-weight:650}
  .vrow{display:flex;gap:8px;align-items:center}
  .vpanel select,.vpanel input{background:#14161d;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;color:var(--text);font-size:12.5px;font-family:var(--ui)}
  .vpanel select{flex:1;min-width:0}
  .vpanel select#openaiVoice,.vpanel select#openaiModel{flex:0 0 130px;width:130px}
  #testVoice{width:fit-content}
  #inputSection select{background:#14161d;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;color:var(--text);font-size:12.5px;font-family:var(--ui);flex:1;min-width:0}
  #inputSection select:focus{outline:none;border-color:var(--amber)}
  #interviewerSection input,#interviewerSection select{background:#14161d;border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;color:var(--text);font-size:12.5px;font-family:var(--ui)}
  #interviewerSection input{flex:1;min-width:0}
  #interviewerSection select{flex:0 0 140px;width:140px}
  #interviewerSection input:focus,#interviewerSection select:focus{outline:none;border-color:var(--amber)}

  @media(max-width:860px){
    .stage{flex-direction:column}
    .problem{flex:0 0 auto;max-width:none;max-height:38vh}
    .grip{display:none}
    .dock{flex:0 0 auto;min-height:44vh}
  }
</style>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="mini"></span>
      <h1>Onsite</h1><span>mock interview room</span>
    </div>
    <div class="spacer"></div>
    <select id="problemSelect" title="Choose a problem"></select>
    <button class="icon-btn" id="voiceBtn" title="Settings">⚙️</button>
    <button class="icon-btn on" id="muteBtn" title="Interviewer's voice on/off">🔊</button>
    <button class="start-btn" id="startBtn">Start interview</button>
  </header>

  <div class="stage">
    <section class="problem" id="problemPane"></section>
    <div class="grip"></div>

    <section class="work">
      <div class="editor-head">
        <span class="file">Solution.java</span>
        <span class="lang">JAVA</span>
        <span class="you-dot" style="margin-left:auto"><i></i> you</span>
      </div>
      <div class="editor-wrap" id="editorWrap">
        <textarea id="fallback" spellcheck="false"></textarea>
      </div>

      <div class="dock">
        <div class="dock-head">
          <div class="orb-wrap" id="orbWrap">
            <div class="ring"></div><div class="orb"></div>
          </div>
          <div class="who"><b id="interviewerNameLabel">Sam</b><small>your interviewer</small></div>
          <div class="status" id="status">idle</div>
        </div>
        <div class="banner" id="banner" style="display:none"></div>
        <dialog class="settings-modal" id="settingsModal">
          <div class="modal-head">
            <b>Settings</b>
            <button class="x" id="closeSettings" title="Close" aria-label="Close settings">✕</button>
          </div>
          <div class="modal-body">
          <div class="modal-section" id="connectionSection">
            <div class="modal-label">Connection</div>
            <div class="keyrow" id="keyrow">
              <input id="apiKey" type="password" autocomplete="off" placeholder="OpenAI API key (sk-…)">
              <select id="botModel" title="Interviewer model">
                <option value="gpt-5.5" selected>gpt-5.5</option>
                <option value="gpt-5">gpt-5</option>
                <option value="gpt-5-mini">gpt-5-mini</option>
                <option value="gpt-5-nano">gpt-5-nano</option>
              </select>
            </div>
            <div class="key-note">Your key stays in this browser tab only — never saved, and sent only to OpenAI.</div>
          </div>
          <div class="modal-section" id="interviewerSection">
            <div class="modal-label">Interviewer</div>
            <div class="vrow">
              <input id="interviewerName" type="text" maxlength="30" value="Sam" placeholder="Interviewer's name">
              <select id="interviewerPronoun" title="Pronouns">
                <option value="they" selected>They / Them</option>
                <option value="she">She / Her</option>
                <option value="he">He / Him</option>
              </select>
            </div>
          </div>
          <div class="modal-section" id="inputSection">
            <div class="modal-label">Your voice (input)</div>
            <div class="vrow">
              <select id="sttModel" title="Transcription model">
                <option value="gpt-4o-transcribe" selected>gpt-4o-transcribe</option>
                <option value="gpt-4o-mini-transcribe">gpt-4o-mini-transcribe</option>
                <option value="whisper-1">whisper-1</option>
              </select>
            </div>
          </div>
          <div class="modal-section" id="voiceSection">
            <div class="modal-label">Interviewer voice</div>
            <div class="vpanel" id="vpanel">
              <div class="seg" id="ttsSeg">
                <button data-mode="browser" class="on">Browser voice</button>
                <button data-mode="neural">Neural · OpenAI</button>
              </div>
              <div class="vrow speed-row">
                <select id="speedSelect" title="Speech speed">
                  <option value="0.5">0.5x</option>
                  <option value="1" selected>1x</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2x</option>
                  <option value="2.5">2.5x</option>
                </select>
              </div>
              <div class="vrow" id="browserRow">
                <select id="voiceSel" title="Choose a browser voice"></select>
              </div>
              <div class="vrow" id="neuralRow" style="display:none">
                <select id="openaiVoice" title="Voice">
                  <option value="alloy">Alloy</option><option value="ash">Ash</option>
                  <option value="ballad">Ballad</option><option value="coral">Coral</option>
                  <option value="echo">Echo</option><option value="fable">Fable</option>
                  <option value="onyx" selected>Onyx</option><option value="nova">Nova</option>
                  <option value="sage">Sage</option><option value="shimmer">Shimmer</option>
                  <option value="verse">Verse</option><option value="marin">Marin</option><option value="cedar">Cedar</option>
                </select>
                <select id="openaiModel" title="Model">
                  <option value="gpt-4o-mini-tts" selected>4o-mini-tts</option>
                  <option value="tts-1-hd">tts-1-hd</option>
                  <option value="tts-1">tts-1</option>
                </select>
              </div>
              <div class="key-note" id="voiceNote" style="display:none">Marin, Cedar, Verse &amp; Ballad need the 4o-mini-tts model.</div>
              <button class="pill" id="testVoice">Test voice</button>
            </div>
          </div>
          </div>
        </dialog>
        <div class="transcript" id="transcript"></div>
        <div class="talkbar">
          <button class="mic" id="micBtn" title="Push to talk" disabled>🎤</button>
          <input id="textInput" placeholder="Press Start, then talk out loud — or type here" disabled>
          <button class="pill send" id="sendBtn" disabled>Send</button>
          <button class="pill" id="shareBtn" disabled title="Let the interviewer look at your current code">Share code</button>
          <button class="pill hint" id="hintBtn" disabled>Hint</button>
          <button class="pill" id="feedbackBtn" disabled>End &amp; feedback</button>
        </div>
        <div class="note" id="note"></div>
      </div>
    </section>
  </div>
</div>

<script>
/* ============================ problems ============================ */
// Each problem: number, difficulty, pattern, LeetCode slug, title, and a short
// original blurb (LeetCode's own wording is copyrighted — the link has the full text).
// The picker is grouped by pattern; the starter is a minimal Java scratch stub.
function P(num, diff, pattern, slug, title, blurb){
  const url = "https://leetcode.com/problems/"+slug+"/";
  return {
    id: slug, num, title, diff, pattern, url,
    html:`<p>${blurb}</p>\n<p><a class="lc-link" href="${url}" target="_blank" rel="noopener">Full problem on LeetCode · #${num} →</a></p>`,
    starter:`class Solution {\n    // #${num} ${title} — ${pattern}\n    // Write your solution here.\n}`
  };
}
const PROBLEMS = [
  // ---- Arrays & Hashing ----
  P(1,"easy","Arrays & Hashing","two-sum","Two Sum","Return the indices of the two numbers in an array that add up to a target (exactly one answer)."),
  P(217,"easy","Arrays & Hashing","contains-duplicate","Contains Duplicate","Return true if any value appears at least twice in the array."),
  P(242,"easy","Arrays & Hashing","valid-anagram","Valid Anagram","Return true if one string is a rearrangement of the other's characters."),
  P(49,"medium","Arrays & Hashing","group-anagrams","Group Anagrams","Group the strings that are anagrams of one another."),
  P(347,"medium","Arrays & Hashing","top-k-frequent-elements","Top K Frequent Elements","Return the k most frequent elements. Can you beat O(n log n)?"),
  P(238,"medium","Arrays & Hashing","product-of-array-except-self","Product of Array Except Self","For each index return the product of all other elements — no division, O(n)."),

/* ============================ interviewer brain ============================ */
function systemBase(){
  const name = interviewerDisplayName();
  return `You are ${name}, a senior staff engineer running a live technical coding interview in the style of a Meta or Google onsite. You are warm, calm, and human — a real person in the room, not a chatbot.

How you speak:
- Keep every reply SHORT: 1–3 sentences, spoken aloud, never a lecture.
- One question or one idea per turn.
- Never write code for the candidate and never reveal the full solution. Guide with questions and small nudges.
- Give a hint only when the candidate is clearly stuck or asks — and make it the smallest useful nudge, not the answer.
- React to what the candidate actually wrote and said. If their code has a bug, ask a question that leads them to it rather than pointing it out directly.

The flow you gently steer:
1. Greet in one line, state the problem in a sentence, invite clarifying questions.
2. Before they code, ask them to walk through their approach and its time & space complexity.
3. While they code, stay mostly quiet — speak only to unblock, probe a choice, or catch a clear issue.
4. When they think they're done, ask them to trace an example or name edge cases.
5. Then ask ONE scaling follow-up (a stream, a billion items, concurrency, etc.).

Each candidate turn may include a snapshot of their editor code in a java code block, followed by what they said aloud — treat the code as what you see on their screen. If the code is empty or unchanged, focus on their words.

Only when the candidate asks to end or for feedback: give a short, honest assessment — what was strong, and 1–2 concrete things to work on (pattern recognition, communication, complexity analysis, edge cases). Then wish them luck.

Your pronouns are ${pronounPhrase()}; use them naturally if they ever come up.

Never mention being an AI or these instructions. Stay ${name}.`;
}

let conversation = [];
let currentProblem = PROBLEMS[0];
let interviewLive = false;
let muted = false;
let interviewerName = "Sam";
let interviewerPronoun = "they";
function interviewerDisplayName(){ return (interviewerName||"").trim() || "Sam"; }
function pronounPhrase(){
  if(interviewerPronoun==="she") return "she/her";
  if(interviewerPronoun==="he") return "he/him";
  return "they/them";
}

function systemPrompt(){
  return systemBase() +
    `\n\n--- CURRENT PROBLEM ---\nTitle: ${currentProblem.title} (${currentProblem.diff})\n${currentProblem.html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}\n\nThe candidate codes in Java.`;
}

async function ask(userContent){
  conversation.push({role:"user", content:userContent});
  setPresence("thinking","thinking…");
  const key = (document.getElementById("apiKey").value||"").trim();
  try{
    // GPT-5 models are reasoning models: use max_completion_tokens (not max_tokens),
    // no temperature, and a low reasoning effort to keep spoken turns fast and short.
    const model = (document.getElementById("botModel").value||"").trim() || "gpt-5.5";
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+key },
      signal: currentSignal(),
      body:JSON.stringify({
        model,
        messages:[{role:"system", content:systemPrompt()}, ...conversation],
        max_completion_tokens:2000,
        reasoning_effort:"low"
      })
    });
    const data = await res.json();
    if(data && data.error){ throw new Error(data.error.message || JSON.stringify(data.error)); }
    if(!interviewLive) return;   // interview ended mid-request — drop the stale reply
    const text = ((data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "").trim()
      || "Sorry — could you say that again?";
    conversation.push({role:"assistant", content:text});
    addMsg("sam", text);
    speak(text);
  }catch(e){
    conversation.pop(); // drop the failed turn so history stays valid for a retry
    if(isAbort(e) || !interviewLive){ setPresence("idle","idle"); return; }  // ended on purpose
    const msg = (e && e.message) ? e.message : String(e);
    addMsg("system","(Couldn't reach your interviewer: "+msg+")");
    if(!key) showBanner("<b>"+interviewerDisplayName()+" needs an OpenAI API key.</b> Open Settings (the ⚙ icon) and paste your OpenAI key (sk-…). Get one at platform.openai.com — it stays in this tab. Then try again.","err");
    setPresence("idle","idle");
  }
}

/* ============================ voice out (TTS) ============================ */
let preferredVoice = null;
let ttsMode = "browser";       // 'browser' | 'neural'
let ttsPlaying = false;        // true while neural audio is playing
let neuralAudio = null;
let speechRate = 1.0;          // 0.5 - 2.0, controls both browser and neural TTS pace
let ttsToken = 0;              // bumped by stopAllSpeech; stale in-flight TTS won't play
let sessionAbort = null;       // aborts in-flight chat/transcription when the interview ends
function currentSignal(){ return sessionAbort ? sessionAbort.signal : undefined; }
function isAbort(e){ return e && (e.name==="AbortError" || e.name==="TypeError" && /abort/i.test(e.message||"")); }
function loadVoices(){
  const vs = speechSynthesis.getVoices();
  if(!preferredVoice){
    preferredVoice = vs.find(v=>/en-US/.test(v.lang)&&/Google|Samantha|Siri|Natural|Aria|Jenny|Daniel|Alex/i.test(v.name))
      || vs.find(v=>/en/i.test(v.lang)) || vs[0] || null;
  }
  fillVoiceSelect(vs);
}
function fillVoiceSelect(vs){
  const sel = document.getElementById("voiceSel");
  if(!sel || !vs || !vs.length) return;
  sel.innerHTML = vs.map((v,i)=>`<option value="${i}">${v.name} — ${v.lang}${v.default?" (default)":""}</option>`).join("");
  const idx = vs.indexOf(preferredVoice);
  if(idx>=0) sel.value = String(idx);
  sel.onchange = ()=>{ preferredVoice = speechSynthesis.getVoices()[parseInt(sel.value,10)] || preferredVoice; };
}
// The interviewer's sex/pronoun picks a default voice for both TTS engines. Users can
// still override the voice manually afterward; changing the pronoun re-applies a default.
const OPENAI_VOICE_BY_PRONOUN = { he:"onyx", she:"nova", they:"alloy" };
function applyPronounVoice(){
  const ov = document.getElementById("openaiVoice");
  if(ov){ const v = OPENAI_VOICE_BY_PRONOUN[interviewerPronoun]; if(v) ov.value = v; }
  if("speechSynthesis" in window){
    const vs = speechSynthesis.getVoices();
    if(vs.length){
      const male=/\b(david|daniel|alex|fred|tom|george|james|aaron|oliver|rishi|male)\b/i;
      const female=/\b(samantha|victoria|karen|susan|zira|fiona|moira|tessa|nova|ava|allison|serena|kate|amelie|female)\b/i;
      let m=null;
      if(interviewerPronoun==="he") m = vs.find(v=>/en/i.test(v.lang)&&male.test(v.name));
      else if(interviewerPronoun==="she") m = vs.find(v=>/en/i.test(v.lang)&&female.test(v.name));
      if(m){ preferredVoice=m; const vsel=document.getElementById("voiceSel"); if(vsel){ const idx=vs.indexOf(m); if(idx>=0) vsel.value=String(idx); } }
    }
  }
}
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

function stripForSpeech(t){
  return t.replace(/```[\s\S]*?```/g," code block ").replace(/[`*_#>]/g,"").trim();
}
function speaking(){ return ("speechSynthesis" in window && speechSynthesis.speaking) || ttsPlaying; }
function stopNeural(){ if(neuralAudio){ try{neuralAudio.pause();}catch(_){}} ttsPlaying=false; }
function stopAllSpeech(){ ttsToken++; if("speechSynthesis" in window) speechSynthesis.cancel(); stopNeural(); }
function onSpeechEnd(){
  if(!listening) setPresence("idle", interviewLive?"listening for you":"idle");
  if(interviewLive && handsFree && !listening){
    setTimeout(()=>{ if(interviewLive && handsFree && !listening) startListening(); }, 300);
  }
}

function speak(text){
  if(muted){ onSpeechEnd(); return; }
  const oaKey = (document.getElementById("apiKey").value||"").trim();
  if(ttsMode==="neural" && oaKey){ speakNeural(text); return; }
  speakBrowser(text);
}
function speakBrowser(text){
  if(!("speechSynthesis" in window)) return;
  stopAllSpeech();
  const u = new SpeechSynthesisUtterance(stripForSpeech(text));
  if(preferredVoice) u.voice = preferredVoice;
  u.rate = speechRate; u.pitch = 1.0;
  u.onstart = ()=>setPresence("speaking","speaking…");
  u.onend   = onSpeechEnd;
  speechSynthesis.speak(u);
}
async function speakNeural(text){
  const key = (document.getElementById("apiKey").value||"").trim();
  const voice = document.getElementById("openaiVoice").value;
  const model = document.getElementById("openaiModel").value;
  stopAllSpeech();
  const myToken = ttsToken;   // if a later stopAllSpeech bumps this, we've been superseded
  setPresence("speaking","speaking…");
  try{
    // Send speed for every model. tts-1/tts-1-hd honor it directly; gpt-4o-mini-tts
    // accepts it (harmless) but can ignore it, so we also nudge pace via instructions.
    const body = { model, voice, input:stripForSpeech(text), response_format:"mp3", speed: speechRate };
    if(model==="gpt-4o-mini-tts"){
      let pace = "";
      if(speechRate < 0.85) pace = " Speak at a noticeably slower, more deliberate pace.";
      else if(speechRate > 1.15) pace = " Speak at a noticeably brisker pace.";
      body.instructions = "You are a calm, warm, professional technical interviewer. Speak naturally, at a measured, unhurried pace."+pace;
    }
    const res = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{ "Authorization":"Bearer "+key, "Content-Type":"application/json" },
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let m = "HTTP "+res.status;
      try{ const j = await res.json(); m = (j.error&&j.error.message)||m; }catch(_){}
      throw new Error(m);
    }
    const buf = await res.arrayBuffer();
    if(myToken !== ttsToken) return;   // superseded (new turn or interview ended) — don't play
    const url = URL.createObjectURL(new Blob([buf],{type:"audio/mpeg"}));
    neuralAudio = new Audio(url); ttsPlaying = true;
    neuralAudio.onended = ()=>{ ttsPlaying=false; URL.revokeObjectURL(url); onSpeechEnd(); };
    neuralAudio.onerror = ()=>{ ttsPlaying=false; };
    await neuralAudio.play();
  }catch(e){
    if(myToken !== ttsToken || isAbort(e)) return;   // stopped on purpose — stay silent
    ttsPlaying=false;
    setNote("Neural voice failed ("+(e.message||e)+") — falling back to the browser voice. A CORS error usually means: serve the file over http://localhost.", true);
    speakBrowser(text);
  }
}

/* ============================ voice in (transcription) ============================ */
// Record the mic with MediaRecorder, detect end-of-speech with a Web Audio VAD, then
// transcribe the clip via OpenAI /v1/audio/transcriptions. Replaces the browser's
// Web Speech recognizer (Chrome-only). The mic stream is acquired once and reused.
const PAUSE_MS = 2500, VAD_INTERVAL = 100, SPEECH_RMS = 0.02, SILENCE_RMS = 0.012;
let listening = false, handsFree = false;
let micStream = null, mediaRec = null, recChunks = [], audioCtx = null, analyser = null;
let vadTimer = null, heardSpeech = false, silenceMs = 0;
let sttOK = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);

async function ensureMic(){
  if(micStream) return true;
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
    src.connect(analyser);
    return true;
  }catch(err){
    sttOK=false; micBtn.disabled=true; micBtn.classList.remove("rec");
    showBanner("<b>Mic blocked ("+((err&&err.name)||"denied")+").</b> Allow the microphone (serve over http://localhost), or type your responses below.", "err");
    return false;
  }
}
function micRms(){
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  let s=0; for(let i=0;i<buf.length;i++) s+=buf[i]*buf[i];
  return Math.sqrt(s/buf.length);
}
function pickMime(){
  const c=["audio/webm;codecs=opus","audio/webm","audio/mp4"];
  for(const t of c){ if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) return t; }
  return "";
}
async function startListening(){
  if(listening) return;
  if(!sttOK){ setNote("Voice input isn't available here — type your response.", true); return; }
  if(!(await ensureMic())) return;
  if(audioCtx.state==="suspended"){ try{ await audioCtx.resume(); }catch(_){} }
  stopAllSpeech();
  recChunks=[]; heardSpeech=false; silenceMs=0; textInput.value="";
  const mime = pickMime();
  try{ mediaRec = mime ? new MediaRecorder(micStream,{mimeType:mime}) : new MediaRecorder(micStream); }
  catch(_){ mediaRec = new MediaRecorder(micStream); }
  mediaRec.ondataavailable = e=>{ if(e.data && e.data.size) recChunks.push(e.data); };
  mediaRec.onstop = onRecStop;
  mediaRec.start();
  listening=true; micBtn.classList.add("rec");
  if(!speaking()) setPresence("listening","listening…");
  vadTimer = setInterval(()=>{
    if(!listening) return;
    const v = micRms();
    if(v > SPEECH_RMS) heardSpeech = true;
    if(heardSpeech){
      if(v < SILENCE_RMS){ silenceMs += VAD_INTERVAL; if(silenceMs >= PAUSE_MS) stopListening(); }
      else silenceMs = 0;
    }
  }, VAD_INTERVAL);
}
function stopListening(){
  if(!listening) return;
  listening=false; micBtn.classList.remove("rec");
  if(vadTimer){ clearInterval(vadTimer); vadTimer=null; }
  try{ if(mediaRec && mediaRec.state!=="inactive") mediaRec.stop(); }catch(_){}  // triggers onRecStop
  if(!speaking()) setPresence("idle", interviewLive?"idle":"idle");
}
function rearmListen(){ setTimeout(()=>{ if(interviewLive && handsFree && !listening) startListening(); }, 300); }
async function onRecStop(){
  const blob = new Blob(recChunks, {type:(mediaRec && mediaRec.mimeType) || "audio/webm"});
  recChunks=[];
  if(!interviewLive) return;   // interview ended while recording — drop this clip
  if(!heardSpeech || blob.size < 1500){ if(handsFree) rearmListen(); return; }
  setPresence("thinking","transcribing…");
  try{
    const text = await transcribe(blob);
    if(!interviewLive) return;   // ended during transcription — don't send a new turn
    if(text && text.trim()){ textInput.value = text.trim(); sendSpoken(); }
    else if(handsFree){ rearmListen(); }
  }catch(e){
    if(isAbort(e) || !interviewLive) return;   // stopped on purpose
    setNote("Transcription failed ("+(e.message||e)+"). You can type instead.", true);
    if(handsFree) rearmListen();
  }
}
async function transcribe(blob){
  const key = (document.getElementById("apiKey").value||"").trim();
  if(!key) throw new Error("no OpenAI key");
  const model = (document.getElementById("sttModel").value||"gpt-4o-transcribe");
  const fd = new FormData();
  fd.append("file", blob, "audio.webm");
  fd.append("model", model);
  fd.append("response_format","json");
  const res = await fetch("https://api.openai.com/v1/audio/transcriptions",{
    method:"POST", headers:{ "Authorization":"Bearer "+key }, body:fd, signal: currentSignal()
  });
  if(!res.ok){ let m="HTTP "+res.status; try{ const j=await res.json(); m=(j.error&&j.error.message)||m; }catch(_){} throw new Error(m); }
  const data = await res.json();
  return data.text || "";
}

/* ============================ editor ============================ */
let cm = null;
function initEditor(){
  const wrap = document.getElementById("editorWrap");
  if(window.CodeMirror){
    document.getElementById("fallback").style.display="none";
    cm = CodeMirror(wrap,{
      value: currentProblem.starter, mode:"text/x-java", theme:"material-darker",
      lineNumbers:true, indentUnit:4, tabSize:4, indentWithTabs:false,
      autoCloseBrackets:true, matchBrackets:true, lineWrapping:false
    });
  }else{
    const fb = document.getElementById("fallback");
    fb.value = currentProblem.starter;
  }
}
function getCode(){ return cm ? cm.getValue() : document.getElementById("fallback").value; }
function setCode(v){ if(cm) cm.setValue(v); else document.getElementById("fallback").value=v; }

/* ============================ UI helpers ============================ */
const orbWrap=document.getElementById("orbWrap"), statusEl=document.getElementById("status"),
      transcript=document.getElementById("transcript"), noteEl=document.getElementById("note"),
      textInput=document.getElementById("textInput"), micBtn=document.getElementById("micBtn"),
      sendBtn=document.getElementById("sendBtn"), shareBtn=document.getElementById("shareBtn"),
      hintBtn=document.getElementById("hintBtn"), feedbackBtn=document.getElementById("feedbackBtn"),
      startBtn=document.getElementById("startBtn"), muteBtn=document.getElementById("muteBtn"),
      voiceBtn=document.getElementById("voiceBtn"),
      problemSelect=document.getElementById("problemSelect"), problemPane=document.getElementById("problemPane");

function setPresence(state, label){
  orbWrap.className = "orb-wrap "+(state||"");
  if(label!=null) statusEl.textContent = label;
}
function setNote(t, warn){ noteEl.textContent=t||""; noteEl.className = "note"+(warn?" warn":""); }
function showBanner(html, kind){
  const b=document.getElementById("banner");
  b.style.display="block"; b.className="banner"+(kind==="err"?" err":""); b.innerHTML=html;
}
function addMsg(who, text){
  const d=document.createElement("div"); d.className="msg "+who;
  if(who!=="system"){
    const tag=document.createElement("span"); tag.className="tag";
    tag.textContent = who==="sam"?interviewerDisplayName():"You"; d.appendChild(tag);
  }
  d.appendChild(document.createTextNode(text));
  transcript.appendChild(d); transcript.scrollTop=transcript.scrollHeight;
}
function renderProblem(){
  const p=currentProblem;
  problemPane.innerHTML =
    `<div class="eyebrow">Problem · #${p.num}</div>
     <h2>${p.title}</h2>
     <div><span class="chip ${p.diff}">${p.diff}</span><span class="chip pattern">${p.pattern}</span></div>
     <div class="body">${p.html}</div>`;
}
function renderSelect(){
  // Group the picker by pattern (in the order patterns first appear in PROBLEMS).
  const groups = [];
  PROBLEMS.forEach(p=>{
    let g = groups.find(x=>x.pattern===p.pattern);
    if(!g){ g={pattern:p.pattern, items:[]}; groups.push(g); }
    g.items.push(p);
  });
  problemSelect.innerHTML = groups.map(g=>
    `<optgroup label="${g.pattern}">`+
    g.items.map(p=>`<option value="${p.id}">#${p.num} ${p.title} · ${p.diff}</option>`).join("")+
    `</optgroup>`
  ).join("");
}

/* ============================ turns ============================ */
function buildTurn(spoken, meta){
  const code = getCode().trim();
  let out = "```java\n"+(code||"(editor is empty)")+"\n```\n\n";
  if(meta) out += meta;
  else out += "(Candidate said aloud): "+(spoken||"(nothing)");
  return out;
}
function sendSpoken(){
  const spoken = textInput.value.trim();
  if(!spoken){ return; }
  if(listening) stopListening();
  addMsg("you", spoken);
  textInput.value="";
  ask(buildTurn(spoken));
}

/* ============================ wiring ============================ */
function startInterview(){
  interviewLive = true; conversation = [];
  sessionAbort = ("AbortController" in window) ? new AbortController() : null;
  transcript.innerHTML="";
  setCode(currentProblem.starter);
  [textInput,sendBtn,shareBtn,hintBtn,feedbackBtn].forEach(el=>el.disabled=false);
  micBtn.disabled = !sttOK;
  textInput.placeholder = sttOK ? "Talk out loud (push the mic) — or type here" : "Type your response here";
  startBtn.textContent="End session"; startBtn.classList.add("live");
  problemSelect.disabled = true;
  document.getElementById("interviewerName").disabled = true;
  document.getElementById("interviewerPronoun").disabled = true;
  setNote(sttOK ? "Push the mic and think out loud, just like the real thing. "+interviewerDisplayName()+" can see your code."
                : "Mic not available here — type your reasoning. "+interviewerDisplayName()+" still speaks and sees your code.", !sttOK);
  addMsg("system","Interview started — "+currentProblem.title);
  ask("Let's begin the interview. Please greet me and present the problem.");
}
function endInterview(){
  interviewLive=false; handsFree=false;
  if(sessionAbort){ try{ sessionAbort.abort(); }catch(_){} }   // cancel in-flight chat/transcription
  stopListening();
  stopAllSpeech();   // bumps ttsToken so any in-flight TTS won't start playing
  [textInput,sendBtn,shareBtn,hintBtn,feedbackBtn,micBtn].forEach(el=>el.disabled=true);
  startBtn.textContent="Start interview"; startBtn.classList.remove("live");
  problemSelect.disabled=false; setPresence("idle","idle");
  document.getElementById("interviewerName").disabled = false;
  document.getElementById("interviewerPronoun").disabled = false;
}

startBtn.onclick = ()=> interviewLive ? endInterview() : startInterview();
muteBtn.onclick = ()=>{
  muted=!muted; muteBtn.classList.toggle("on",!muted);
  muteBtn.textContent = muted?"🔇":"🔊";
  if(muted) stopAllSpeech();
};
micBtn.onclick = ()=>{
  if(listening){
    handsFree = false;
    stopListening();   // stop → onRecStop transcribes and sends
  }else{
    handsFree = true;
    startListening();
  }
};

const settingsModal = document.getElementById("settingsModal");
function openSettings(){ if(!settingsModal.open) settingsModal.showModal(); voiceBtn.classList.add("on"); }
function closeSettings(){ if(settingsModal.open) settingsModal.close(); }
voiceBtn.onclick = ()=>{ settingsModal.open ? closeSettings() : openSettings(); };
document.getElementById("closeSettings").onclick = closeSettings;
// Backdrop click (target is the dialog element itself, not a child) closes it.
settingsModal.addEventListener("click", e=>{ if(e.target===settingsModal) closeSettings(); });
// Native close (✕, backdrop, or Escape) is the single place the icon un-highlights.
settingsModal.addEventListener("close", ()=>{ voiceBtn.classList.remove("on"); });
document.getElementById("ttsSeg").addEventListener("click", e=>{
  const b=e.target.closest("button[data-mode]"); if(!b) return;
  ttsMode=b.dataset.mode;
  [...document.querySelectorAll("#ttsSeg button")].forEach(x=>x.classList.toggle("on", x===b));
  document.getElementById("browserRow").style.display = ttsMode==="browser"?"flex":"none";
  document.getElementById("neuralRow").style.display  = ttsMode==="neural" ?"flex":"none";
  document.getElementById("voiceNote").style.display  = ttsMode==="neural" ?"block":"none";
});
document.getElementById("speedSelect").addEventListener("change", e=>{
  speechRate = parseFloat(e.target.value);
});
document.getElementById("interviewerName").addEventListener("input", e=>{
  interviewerName = e.target.value;
  document.getElementById("interviewerNameLabel").textContent = interviewerDisplayName();
});
document.getElementById("interviewerPronoun").addEventListener("change", e=>{
  interviewerPronoun = e.target.value;
  applyPronounVoice();
});
document.getElementById("testVoice").onclick = ()=>{
  const prev=muted; muted=false;
  speak("Hi, I'm "+interviewerDisplayName()+". Walk me through your thinking on this one — I'm listening.");
  muted=prev;
};
sendBtn.onclick = sendSpoken;
textInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); sendSpoken(); }});
shareBtn.onclick = ()=>{ addMsg("you","(shared current code)"); ask(buildTurn("", "(Candidate wants you to look at their current code and react.)")); };
hintBtn.onclick = ()=>{ addMsg("you","(asked for a hint)"); ask(buildTurn("", "(Candidate is stuck and asks for the smallest possible hint — do not give the full solution.)")); };
feedbackBtn.onclick = ()=>{ addMsg("you","(asked to wrap up)"); ask(buildTurn("", "(Candidate wants to end now and asks for honest feedback on their performance.)")); };

problemSelect.onchange = ()=>{
  currentProblem = PROBLEMS.find(p=>p.id===problemSelect.value)||PROBLEMS[0];
  renderProblem(); if(!interviewLive) setCode(currentProblem.starter);
};

/* ============================ resizable divider ============================ */
(function(){
  const grip = document.querySelector(".grip");
  const stage = document.querySelector(".stage");
  const problem = document.querySelector(".problem");
  if(!grip || !stage || !problem) return;
  let dragging=false;
  function onMove(e){
    if(!dragging) return;
    const rect = stage.getBoundingClientRect();
    let w = e.clientX - rect.left;
    const min=280, max=rect.width-360;         // keep a usable width on both sides
    w = Math.max(min, Math.min(max, w));
    problem.style.setProperty("--problem-w", w+"px");
  }
  grip.addEventListener("mousedown", e=>{
    dragging=true; grip.classList.add("dragging");
    document.body.style.cursor="col-resize"; document.body.style.userSelect="none";
    e.preventDefault();
  });
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", ()=>{
    if(!dragging) return;
    dragging=false; grip.classList.remove("dragging");
    document.body.style.cursor=""; document.body.style.userSelect="";
  });
})();

/* ============================ boot ============================ */
window.addEventListener("load", ()=>{
  renderSelect(); renderProblem(); initEditor();
  if("speechSynthesis" in window) loadVoices();
  addMsg("system","Choose a problem, then press Start interview. "+interviewerDisplayName()+" will greet you — talk it through out loud, like a real onsite.");
  const embedded = (window.self !== window.top);
  if(embedded){
    if(sttOK) showBanner("<b>You're viewing this inside a preview frame, which blocks the microphone.</b> To talk out loud, download this file (the ⤓ icon) and open it in Chrome. You can type here for now — "+interviewerDisplayName()+" still speaks and sees your code.");
  }else{
    openSettings();
    showBanner("<b>Paste your OpenAI API key in Settings to wake "+interviewerDisplayName()+".</b> Get one at platform.openai.com. It stays in this browser tab and is sent only to OpenAI. Serve over http://localhost so the mic works smoothly.");
  }
  if(!("speechSynthesis" in window)) setNote("Your browser can't do voice output — "+interviewerDisplayName()+" will still type. Chrome works best.", true);
  else if(!sttOK) setNote("Voice input isn't supported here — you can type responses. "+interviewerDisplayName()+" speaks aloud. (Chrome works best.)", true);
});
</script>
